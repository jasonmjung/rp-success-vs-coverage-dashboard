<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coverage Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #faf6ec; font-family: Helvetica, Arial, sans-serif; }
  button, input { font-family: Helvetica, Arial, sans-serif; }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.55; cursor: default; }
</style>
</head>
<body>

<!-- Toolbar -->
<div style="position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:flex-end;gap:8px;background:rgba(250,246,236,0.92);backdrop-filter:blur(8px);padding:8px 16px;border-bottom:1px solid #e8dfc8;">
  <button id="edit-btn" onclick="togglePanel()"
    style="display:inline-flex;align-items:center;gap:6px;border:none;border-radius:6px;background:#3d5851;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:1.2px;color:#faf6ec;cursor:pointer;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
    EDIT DATA
  </button>
  <button id="export-png-btn" onclick="exportPng()"
    style="display:inline-flex;align-items:center;gap:6px;border:none;border-radius:6px;background:#dda13b;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:1.2px;color:#2a1f0e;cursor:pointer;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    EXPORT PNG
  </button>
  <button id="export-html-btn" onclick="exportHtml()"
    style="display:inline-flex;align-items:center;gap:6px;border:none;border-radius:6px;background:#4a6fa5;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:1.2px;color:#fff;cursor:pointer;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13 2 2 4-4"/></svg>
    EXPORT HTML
  </button>
</div>

<!-- Edit Panel -->
<div id="edit-panel" style="display:none;border-bottom:1px solid #e8dfc8;background:#fff;padding:16px;">
  <div style="max-width:900px;margin:0 auto;">

    <!-- Sheet import -->
    <div style="margin-bottom:16px;border-radius:4px;border:1px solid #c4cdaf;background:#f5f2ea;padding:10px 12px;">
      <div style="margin-bottom:6px;display:flex;align-items:center;gap:5px;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#6b6357" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span style="font-size:9.5px;font-weight:700;letter-spacing:1.8px;color:#6b6357;">IMPORT FROM GOOGLE SHEET</span>
      </div>
      <div style="display:flex;gap:8px;">
        <input id="sheet-url" type="text" placeholder="Paste your public Google Sheet URL here…"
          style="flex:1;border-radius:4px;border:1px solid #c9b89a;background:#fff;padding:6px 8px;font-size:12px;color:#1f1a14;outline:none;"
          onfocus="this.style.borderColor='#3d5851'" onblur="this.style.borderColor='#c9b89a'"
          onkeydown="if(event.key==='Enter')importSheet()"/>
        <button id="import-btn" onclick="importSheet()"
          style="border:none;border-radius:4px;background:#3d5851;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:1.2px;color:#faf6ec;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          IMPORT
        </button>
      </div>
      <div id="import-status" style="display:none;margin-top:6px;font-size:10.5px;align-items:center;gap:5px;"></div>
      <p style="margin-top:6px;font-size:9px;color:#9b8f82;">Sheet must be <strong>Anyone with the link can view</strong>. Columns: A = Coverage, B = % of Routes, C = Success Rate, D = Percentile, E = Player name (row 2).</p>
    </div>

    <!-- Manual input -->
    <div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:10px;font-weight:700;letter-spacing:2px;color:#6b6357;">MANUAL INPUT</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:10px;letter-spacing:1.5px;color:#6b6357;">PLAYER:</label>
        <input id="player-name-input" type="text"
          style="border-radius:4px;border:1px solid #c9b89a;background:#fff;padding:4px 8px;font-size:12px;color:#1f1a14;outline:none;width:180px;"
          onfocus="this.style.borderColor='#dda13b'" onblur="this.style.borderColor='#c9b89a'"
          oninput="state.playerName=this.value"/>
      </div>
    </div>

    <div style="border-radius:4px;border:1px solid #c9b89a;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#3d5851;">
            <th style="padding:8px 12px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:1.5px;color:#faf6ec;width:140px;">COVERAGE TYPE</th>
            <th style="padding:8px 12px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:1.5px;color:#faf6ec;">% OF ROUTES</th>
            <th style="padding:8px 12px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:1.5px;color:#faf6ec;">SUCCESS RATE</th>
            <th style="padding:8px 12px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:1.5px;color:#faf6ec;">PERCENTILE</th>
          </tr>
        </thead>
        <tbody id="input-rows"></tbody>
      </table>
    </div>
    <p style="margin-top:8px;font-size:9px;color:#9b8f82;">Changes update the dashboard live.</p>
  </div>
</div>

<!-- Dashboard -->
<div style="min-height:100vh;display:flex;justify-content:center;background:#faf6ec;">
  <div id="export-target" style="width:100%;max-width:960px;background:#faf6ec;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;padding:48px;">
      <div id="dashboard-content"></div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  playerName: "Luther Burden III",
  rows: [
    { label: "MAN",    routePercent: "47.5%", successRate: "68.4%", percentile: "44th" },
    { label: "ZONE",   routePercent: "47.5%", successRate: "68.4%", percentile: "44th" },
    { label: "PRESS",  routePercent: "47.5%", successRate: "68.4%", percentile: "44th" },
    { label: "DOUBLE", routePercent: "47.5%", successRate: "-", percentile: "-" },
  ]
};

// ── Color utils ───────────────────────────────────────────────────────────────
function qColor(v)  { return v>=75?"#609c63":v>=50?"#e3ca61":v>=25?"#e4a345":"#d15650"; }
function qTrack(v)  { return v>=75?"#cad7b1":v>=50?"#f0e9a0":v>=25?"#f5ddb0":"#f0c0be"; }
function pct(val)   { const n=parseFloat(String(val).replace("%","")); return isNaN(n)?0:Math.min(100,Math.max(0,n)); }
function pctile(val){ const m=String(val).match(/\d+/); return m?Math.min(100,Math.max(0,parseInt(m[0],10))):-1; }
function fmtPct(val){ return (!val||String(val).trim()==="-")?"-":String(val).toUpperCase(); }
function hasPct(val){ return !isNaN(parseFloat(String(val).replace("%",""))); }

// ── SVG ring ──────────────────────────────────────────────────────────────────
// Rendered as an <img> with the SVG embedded as a data URI. html2canvas mis-positions
// inline <svg> elements but renders <img> replaced elements at their correct box —
// so this is the only reliable way to keep the donut centered in the PNG export.
function ringSvg(value, color) {
  const r=42, circ=2*Math.PI*r, offset=circ-(value/100)*circ, track=qTrack(value);
  return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' width='120' height='120'>`
    + `<g transform='rotate(-90 50 50)'>`
    + `<circle cx='50' cy='50' r='${r}' fill='none' stroke='${track}' stroke-width='9'/>`
    + `<circle cx='50' cy='50' r='${r}' fill='none' stroke='${color}' stroke-width='9' `
    + `stroke-dasharray='${circ.toFixed(2)}' stroke-dashoffset='${offset.toFixed(2)}' stroke-linecap='round'/>`
    + `</g>`
    + `<text x='50' y='50' text-anchor='middle' dominant-baseline='central' `
    + `fill='${color}' font-size='12' font-family='Helvetica,Arial,sans-serif' font-weight='600'>${value.toFixed(1)}%</text>`
    + `</svg>`;
}
function ring(value, color) {
  const uri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(ringSvg(value, color));
  return `<img src="${uri}" width="120" height="120" alt="" style="display:inline-block;vertical-align:top;"/>`;
}

// ── Dashboard render ──────────────────────────────────────────────────────────
function renderDashboard() {
  const { rows } = state;

  const tableRows = rows.map((row, i) => {
    const rv=pct(row.routePercent), sv=pct(row.successRate);
    const pn=pctile(row.percentile), pc=pn>=0?qColor(pn):"#c9b89a";
    const bt=i>0?"border-top:1px solid #f0e8d8;":"";
    return `<div style="display:flex;align-items:center;padding:12px 22px;${bt}">
      <div style="flex:0 0 120px;font-size:15px;font-weight:600;color:#1f1a14;">${row.label}</div>
      <div style="flex:2.1;display:flex;align-items:center;gap:14px;padding-right:18px;">
        <div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden;background:${qTrack(rv)};">
          <div style="width:${rv}%;background:${qColor(rv)};border-radius:4px;flex-shrink:0;"></div>
        </div>
        <span style="font-size:13px;font-weight:600;color:${qColor(rv)};min-width:42px;">${row.routePercent}</span>
      </div>
      <div style="flex:2.1;display:flex;align-items:center;gap:14px;padding-left:18px;border-left:1px solid #c9b89a;">
        ${hasPct(row.successRate)
          ? `<div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden;background:${qTrack(sv)};">
               <div style="width:${sv}%;background:${qColor(sv)};border-radius:4px;flex-shrink:0;"></div>
             </div>
             <span style="font-size:13px;font-weight:600;color:${qColor(sv)};min-width:42px;">${row.successRate}</span>`
          : `<span style="font-size:13px;font-weight:600;color:#c9b89a;">-</span>`}
      </div>
      <div style="flex:0 0 80px;display:flex;justify-content:flex-end;">
        ${pn>=0
          ? `<span style="background:${pc};color:#fff;border-radius:999px;padding:5px 10px;display:inline-flex;align-items:center;font-size:11px;font-weight:700;">${fmtPct(row.percentile)}</span>`
          : `<span style="font-size:13px;font-weight:600;color:#c9b89a;">-</span>`}
      </div>
    </div>`;
  }).join("");

  const cards = rows.map(row => {
    const rv=pct(row.routePercent), sv=pct(row.successRate);
    return `<div style="background:#fff;border-radius:6px;border:1.5px solid rgba(61,88,81,0.24);padding:12px 14px;">
      <div style="text-align:center;margin-bottom:8px;font-size:15px;font-weight:600;color:#1f1a14;">${row.label}</div>
      <div style="text-align:center;margin-bottom:14px;">${ring(rv, qColor(rv))}</div>
      <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:#6b6357;margin-bottom:4px;">SUCCESS RATE</div>
      ${hasPct(row.successRate)
        ? `<div style="display:flex;align-items:center;gap:8px;">
             <div style="flex:1;height:7px;border-radius:4px;overflow:hidden;background:${qTrack(sv)};">
               <div style="width:${sv}%;height:100%;background:${qColor(sv)};border-radius:4px;"></div>
             </div>
             <span style="font-size:11px;font-weight:600;color:${qColor(sv)};min-width:36px;text-align:right;">${row.successRate}</span>
           </div>`
        : `<div style="font-size:11px;font-weight:600;color:#c9b89a;">-</div>`}
    </div>`;
  }).join("");

  document.getElementById("dashboard-content").innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:28px;margin-bottom:40px;width:100%;">
      <div style="text-align:center;line-height:0.9;">
        <div style="font-size:60px;font-weight:500;color:#3d584e;letter-spacing:-2px;font-family:'Montserrat',Helvetica,Arial,sans-serif;">SUCCESS RATE</div>
        <div style="font-size:60px;font-weight:900;color:#3d584e;letter-spacing:-2px;font-family:'Montserrat',Helvetica,Arial,sans-serif;">VS. COVERAGE</div>
      </div>
      <div style="height:2px;width:52px;background:#b9aed3;border-radius:2px;"></div>
    </div>
    <div style="width:100%;border:1.5px solid rgba(61,88,81,0.24);border-radius:6px;overflow:hidden;margin-bottom:40px;">
      <div style="display:flex;align-items:center;background:#3d5851;padding:0 22px;min-height:45px;">
        <div style="flex:0 0 120px;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">COVERAGE</div>
        <div style="flex:2.1;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">% OF ROUTES</div>
        <div style="flex:2.1;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">SUCCESS RATE</div>
        <div style="flex:0 0 80px;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;text-align:right;">PCTILE</div>
      </div>
      <div style="background:#fff;">${tableRows}</div>
    </div>
    <div style="width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:11px;">${cards}</div>`;
}

// ── Edit panel inputs ─────────────────────────────────────────────────────────
function syncInputs() {
  const ni = document.getElementById("player-name-input");
  if (ni) ni.value = state.playerName;
  state.rows.forEach((row, i) => {
    const r = document.getElementById(`inp-route-${i}`);
    const s = document.getElementById(`inp-success-${i}`);
    const p = document.getElementById(`inp-pctile-${i}`);
    if (r) r.value = row.routePercent;
    if (s) s.value = row.successRate;
    if (p) p.value = row.percentile;
  });
}

function buildInputRows() {
  const inpStyle = "width:100%;background:transparent;font-size:12px;color:#1f1a14;outline:none;border:1px solid transparent;padding:4px 6px;border-radius:4px;";
  const focus = "this.style.borderColor='#dda13b';this.style.background='#fdf9f0';";
  const blur  = "this.style.borderColor='transparent';this.style.background='transparent';";
  document.getElementById("input-rows").innerHTML = state.rows.map((row, i) =>
    `<tr style="${i%2===0?'background:#fff':'background:#faf8f3'}">
      <td style="border-top:1px solid #e8dfc8;padding:8px 12px;font-size:12px;font-weight:500;color:#3d5851;">${row.label}</td>
      <td style="border-top:1px solid #e8dfc8;padding:6px 12px;">
        <input id="inp-route-${i}" type="text" value="${row.routePercent}" placeholder="e.g. 28.7%"
          style="${inpStyle}" onfocus="${focus}" onblur="${blur}"
          oninput="state.rows[${i}].routePercent=this.value;renderDashboard()"/>
      </td>
      <td style="border-top:1px solid #e8dfc8;padding:6px 12px;">
        <input id="inp-success-${i}" type="text" value="${row.successRate}" placeholder="e.g. 71.1%"
          style="${inpStyle}" onfocus="${focus}" onblur="${blur}"
          oninput="state.rows[${i}].successRate=this.value;renderDashboard()"/>
      </td>
      <td style="border-top:1px solid #e8dfc8;padding:6px 12px;">
        <input id="inp-pctile-${i}" type="text" value="${row.percentile}" placeholder="e.g. 65th"
          style="${inpStyle}" onfocus="${focus}" onblur="${blur}"
          oninput="state.rows[${i}].percentile=this.value;renderDashboard()"/>
      </td>
    </tr>`
  ).join("");
  document.getElementById("player-name-input").value = state.playerName;
}

let panelOpen = false;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById("edit-panel").style.display = panelOpen ? "block" : "none";
  const btn = document.getElementById("edit-btn");
  btn.innerHTML = panelOpen
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg> HIDE DATA`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg> EDIT DATA`;
  if (panelOpen) buildInputRows();
}

// ── Google Sheet import ───────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    cols.push(cur.trim()); rows.push(cols);
  }
  return rows;
}

function normPct(raw) {
  const s = String(raw).trim();
  if (!s || s === "-") return "-";
  if (s.endsWith("%")) return s;
  const n = parseFloat(s);
  if (isNaN(n)) return s;
  return (Math.abs(n) < 1.5 && s.includes(".")) ? `${(n*100).toFixed(1)}%` : `${n}%`;
}

function setStatus(msg, color) {
  const el = document.getElementById("import-status");
  el.style.display = "flex"; el.style.color = color; el.textContent = msg;
}

async function importSheet() {
  const url = document.getElementById("sheet-url").value.trim();
  if (!url) return;
  const btn = document.getElementById("import-btn");
  btn.disabled = true; btn.textContent = "IMPORTING…";
  setStatus("Fetching sheet…", "#6b6357");
  try {
    const idM = url.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if (!idM) throw new Error("No spreadsheet ID found — paste the full Google Sheets URL.");
    const gidM = url.match(/[#?&]gid=(\d+)/);
    const csvUrl = `https://docs.google.com/spreadsheets/d/${idM[1]}/export?format=csv&gid=${gidM?gidM[1]:"0"}`;
    // Google Sheets blocks direct browser fetches (CORS). Try direct first, proxy as fallback.
    let csvText;
    try {
      const r = await fetch(csvUrl);
      if (!r.ok) throw new Error("direct");
      csvText = await r.text();
    } catch {
      const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`;
      const r = await fetch(proxy);
      if (!r.ok) throw new Error(`HTTP ${r.status} — make sure the sheet is set to "Anyone with the link can view".`);
      csvText = await r.text();
    }
    const parsed = parseCSV(csvText);
    const data = parsed.slice(1).filter(r => r.some(c => c !== ""));
    if (!data.length) throw new Error("Sheet appears to be empty.");
    const name = data[0]?.[4]?.trim();
    const rows = data.slice(0, 4).map(r => ({
      label: (r[0]??"").toUpperCase().trim(),
      routePercent: normPct(r[1]??""),
      successRate:  normPct(r[2]??""),
      percentile:   (r[3]??"").trim() || "-",
    }));
    if (name) state.playerName = name;
    state.rows = rows;
    renderDashboard();
    syncInputs();
    setStatus(`✓ Imported ${rows.length} rows${name ? " for " + name : ""}`, "#609c63");
  } catch (e) {
    setStatus("✗ " + e.message, "#d15650");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> IMPORT`;
  }
}

// ── PNG export ────────────────────────────────────────────────────────────────
async function exportPng() {
  const btn = document.getElementById("export-png-btn");
  btn.disabled = true; btn.textContent = "EXPORTING…";
  try {
    await document.fonts.ready;
    const target = document.getElementById("export-target");
    const wrapper = target.firstElementChild;
    const content = document.getElementById("dashboard-content");
    // Capture wrapper directly (not target) — target is flex-stretched to viewport height,
    // causing huge empty space below. Wrapper is naturally sized to content.
    const prev = { w: wrapper.style.width, p: wrapper.style.padding, a: wrapper.style.alignItems, cw: content.style.width };
    wrapper.style.width = "960px";
    wrapper.style.padding = "48px";
    wrapper.style.alignItems = "stretch";
    content.style.width = "100%";
    // Wait for all donut <img> data-URIs to finish decoding before capture.
    await Promise.all([...wrapper.querySelectorAll("img")].map(img =>
      img.complete && img.naturalWidth
        ? Promise.resolve()
        : new Promise(res => { img.onload = img.onerror = res; })
    ));
    const source = await html2canvas(wrapper, {
      backgroundColor: "#faf6ec", scale: 4, useCORS: true, logging: false,
    });
    wrapper.style.width = prev.w;
    wrapper.style.padding = prev.p;
    wrapper.style.alignItems = prev.a;
    content.style.width = prev.cw;
    // 4:3 output canvas, equal padding on all sides
    const TW=3840, TH=2880, PAD=160, R=128;
    const sc = Math.min((TW-PAD*2)/source.width, (TH-PAD*2)/source.height);
    const dW=Math.round(source.width*sc), dH=Math.round(source.height*sc);
    const out = document.createElement("canvas");
    out.width=TW; out.height=TH;
    const ctx = out.getContext("2d");
    ctx.beginPath();
    ctx.moveTo(R,0); ctx.lineTo(TW-R,0); ctx.arcTo(TW,0,TW,R,R);
    ctx.lineTo(TW,TH-R); ctx.arcTo(TW,TH,TW-R,TH,R);
    ctx.lineTo(R,TH); ctx.arcTo(0,TH,0,TH-R,R);
    ctx.lineTo(0,R); ctx.arcTo(0,0,R,0,R);
    ctx.closePath(); ctx.clip();
    ctx.fillStyle="#faf6ec"; ctx.fillRect(0,0,TW,TH);
    ctx.drawImage(source, Math.round((TW-dW)/2), Math.round((TH-dH)/2), dW, dH);
    const a = document.createElement("a");
    a.download = `${state.playerName.replace(/\s+/g,"_").toUpperCase()}_coverage.png`;
    a.href = out.toDataURL("image/png"); a.click();
  } catch(e) { alert("Export failed: " + e.message); }
  finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> EXPORT PNG`;
  }
}

// ── HTML export ───────────────────────────────────────────────────────────────
function generateHtml() {
  const { playerName, rows } = state;
  const tableRows = rows.map((row, i) => {
    const rv=pct(row.routePercent), sv=pct(row.successRate);
    const pn=pctile(row.percentile), pc=pn>=0?qColor(pn):"#c9b89a";
    const bt=i>0?"border-top:1px solid #f0e8d8;":"";
    return `<div style="display:flex;align-items:center;padding:12px 22px;${bt}">
      <div style="flex:0 0 120px;font-family:Helvetica,Arial,sans-serif;font-size:15px;font-weight:600;color:#1f1a14;">${row.label}</div>
      <div style="flex:2.1;display:flex;align-items:center;gap:14px;padding-right:18px;">
        <div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden;background:${qTrack(rv)};"><div style="width:${rv}%;background:${qColor(rv)};border-radius:4px;flex-shrink:0;"></div></div>
        <span style="font-family:Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:${qColor(rv)};min-width:42px;">${row.routePercent}</span>
      </div>
      <div style="flex:2.1;display:flex;align-items:center;gap:14px;padding-left:18px;border-left:1px solid #c9b89a;">
        ${hasPct(row.successRate)
          ? `<div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden;background:${qTrack(sv)};"><div style="width:${sv}%;background:${qColor(sv)};border-radius:4px;flex-shrink:0;"></div></div>
             <span style="font-family:Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:${qColor(sv)};min-width:42px;">${row.successRate}</span>`
          : `<span style="font-family:Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:#c9b89a;">-</span>`}
      </div>
      <div style="flex:0 0 80px;display:flex;justify-content:flex-end;">
        ${pn>=0
          ? `<span style="background:${pc};color:#fff;border-radius:999px;padding:5px 10px;display:inline-flex;align-items:center;font-family:Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;">${fmtPct(row.percentile)}</span>`
          : `<span style="font-family:Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:#c9b89a;">-</span>`}
      </div>
    </div>`;
  }).join("");

  const cards = rows.map(row => {
    const rv=pct(row.routePercent), sv=pct(row.successRate);
    const r=42, circ=(2*Math.PI*r), offset=circ-(rv/100)*circ;
    return `<div style="background:#fff;border-radius:6px;border:1.5px solid rgba(61,88,81,0.24);padding:12px 14px;">
      <div style="text-align:center;margin-bottom:8px;font-family:Helvetica,Arial,sans-serif;font-size:15px;font-weight:600;color:#1f1a14;">${row.label}</div>
      <div style="text-align:center;margin-bottom:14px;">
        <svg viewBox="0 0 100 100" width="120" height="120" style="display:inline-block;vertical-align:top;">
          <g transform="rotate(-90 50 50)">
            <circle cx="50" cy="50" r="${r}" fill="none" stroke="${qTrack(rv)}" stroke-width="9"/>
            <circle cx="50" cy="50" r="${r}" fill="none" stroke="${qColor(rv)}" stroke-width="9" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
          </g>
          <text x="50" y="50" text-anchor="middle" dominant-baseline="central" fill="${qColor(rv)}" font-size="12" font-family="Helvetica,Arial,sans-serif" font-weight="600">${rv.toFixed(1)}%</text>
        </svg>
      </div>
      <div style="font-family:Helvetica,Arial,sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#6b6357;margin-bottom:4px;">SUCCESS RATE</div>
      ${hasPct(row.successRate)
        ? `<div style="display:flex;align-items:center;gap:8px;">
             <div style="flex:1;height:7px;border-radius:4px;overflow:hidden;background:${qTrack(sv)};"><div style="width:${sv}%;height:100%;background:${qColor(sv)};border-radius:4px;"></div></div>
             <span style="font-family:Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;color:${qColor(sv)};min-width:36px;text-align:right;">${row.successRate}</span>
           </div>`
        : `<div style="font-family:Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;color:#c9b89a;">-</div>`}
    </div>`;
  }).join("");

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Coverage Dashboard — ${playerName}</title></head>
<body style="margin:0;background:#faf6ec;font-family:Helvetica,Arial,sans-serif;">
<div style="background:#faf6ec;max-width:960px;margin:0 auto;padding:40px 48px 32px;box-sizing:border-box;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:28px;margin-bottom:40px;">
    <div style="text-align:center;line-height:0.9;">
      <div style="font-size:60px;font-weight:500;color:#3d584e;letter-spacing:-2px;font-family:'Montserrat',Helvetica,Arial,sans-serif;">SUCCESS RATE</div>
      <div style="font-size:60px;font-weight:900;color:#3d584e;letter-spacing:-2px;font-family:'Montserrat',Helvetica,Arial,sans-serif;">VS. COVERAGE</div>
    </div>
    <div style="height:2px;width:52px;background:#b9aed3;border-radius:2px;"></div>
  </div>
  <div style="border:1.5px solid rgba(61,88,81,0.24);border-radius:6px;overflow:hidden;margin-bottom:40px;">
    <div style="display:flex;align-items:center;background:#3d5851;padding:0 22px;min-height:45px;">
      <div style="flex:0 0 120px;font-family:Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">COVERAGE</div>
      <div style="flex:2.1;font-family:Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">% OF ROUTES</div>
      <div style="flex:2.1;font-family:Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;">SUCCESS RATE</div>
      <div style="flex:0 0 80px;font-family:Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#faf6ec;text-align:right;">PCTILE</div>
    </div>
    <div style="background:#fff;">${tableRows}</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:11px;">${cards}</div>
</div>
</body></html>`;
}

function exportHtml() {
  const blob = new Blob([generateHtml()], { type: "text/html;charset=utf-8" });
  const a = document.createElement("a");
  a.download = `${state.playerName.replace(/\s+/g,"_").toUpperCase()}_coverage.html`;
  a.href = URL.createObjectURL(blob); a.click();
  URL.revokeObjectURL(a.href);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
